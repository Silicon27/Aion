name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up LLVM (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-16-dev lld-16 liblld-16-dev libclang-16-dev libedit-dev libcurl4-openssl-dev
        echo "LLVM_DIR=/usr/lib/llvm-16/lib/cmake/llvm" >> $GITHUB_ENV
        echo "/usr/lib/llvm-16/bin" >> $GITHUB_PATH

    - name: Set up LLVM (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install llvm@16
        echo "LLVM_DIR=$(brew --prefix llvm@16)/lib/cmake/llvm" >> $GITHUB_ENV

    - name: Set up LLVM (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install llvm --version=16.0.0 --allow-downgrade
        echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
        echo "LLVM_DIR=C:\Program Files\LLVM\lib\cmake\llvm" >> $GITHUB_ENV

    - name: Configure CMake
      shell: bash
      run: cmake -G Ninja -B build -D BUILD_TESTS=ON -D CMAKE_BUILD_TYPE=Release

    - name: Build
      shell: bash
      run: cmake --build build --config Release

    - name: Run Tests
      shell: bash
      run: |
        cd build
        ctest -C Release --output-on-failure
