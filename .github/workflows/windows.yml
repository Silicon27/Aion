name: Windows CI

on:
  push:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'

jobs:
  build-and-test:
    name: Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache LLVM
      id: cache-llvm
      uses: actions/cache@v4
      with:
        path: C:/Program Files/LLVM
        key: llvm-16.0.0-windows

    - name: Set up LLVM (Windows)
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      shell: bash
      run: |
        choco install llvm --version=16.0.0 --allow-downgrade --force

    - name: Set LLVM Environment
      shell: bash
      run: |
        # Keep LLVM bin out of PATH to prioritize MSVC cl.exe
        echo "LLVM_DIR=C:/Program Files/LLVM/lib/cmake/llvm" >> $GITHUB_ENV

    - name: Configure CMake
      shell: bash
      run: cmake -G Ninja -B build -D BUILD_TESTS=ON -D CMAKE_BUILD_TYPE=Release -D LLVM_DIR="C:/Program Files/LLVM/lib/cmake/llvm" -D CMAKE_C_COMPILER=cl -D CMAKE_CXX_COMPILER=cl

    - name: Build
      shell: bash
      run: cmake --build build --config Release -v

    - name: Run Tests
      shell: bash
      run: |
        cd build
        ctest -C Release --output-on-failure
