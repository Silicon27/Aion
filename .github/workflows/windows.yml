name: Windows CI

on:
  push:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'

jobs:
  build-and-test:
    name: Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache LLVM
      id: cache-llvm
      uses: actions/cache@v4
      with:
        path: C:/Program Files/LLVM
        key: llvm-16.0.0-windows

    - name: Set up LLVM (Windows)
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      shell: bash
      run: |
        choco install llvm --version=16.0.0 --allow-downgrade --force

    - name: Set LLVM Environment
      shell: bash
      run: |
        # Locate LLVMConfig.cmake dynamically
        SEARCH_PATH="C:/Program Files/LLVM"
        CONF_PATH=$(find "$SEARCH_PATH" -name LLVMConfig.cmake -print -quit)
        if [ -n "$CONF_PATH" ]; then
          LLVM_DIR=$(dirname "$CONF_PATH")
          # Convert to Windows style path with forward slashes for CMake
          LLVM_DIR=$(cygpath -m "$LLVM_DIR")
          echo "LLVM_DIR=$LLVM_DIR" >> $GITHUB_ENV
          echo "Found LLVM config at $LLVM_DIR"
        else
          echo "LLVM_DIR=C:/Program Files/LLVM/lib/cmake/llvm" >> $GITHUB_ENV
          echo "LLVM config not found, defaulting to C:/Program Files/LLVM/lib/cmake/llvm"
        fi

    - name: Configure CMake
      shell: bash
      run: cmake -G Ninja -B build -D BUILD_TESTS=ON -D CMAKE_BUILD_TYPE=Release -D LLVM_DIR="${{ env.LLVM_DIR }}" -D CMAKE_C_COMPILER=cl -D CMAKE_CXX_COMPILER=cl

    - name: Build
      shell: bash
      run: cmake --build build --config Release -v

    - name: Run Tests
      shell: bash
      run: |
        cd build
        ctest -C Release --output-on-failure
