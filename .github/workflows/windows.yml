name: Windows CI

on:
  push:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'core/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - '.github/workflows/windows.yml'

jobs:
  build-and-test:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:/Program Files/LLVM
          key: llvm-16.0.0-windows-v6

      - name: Set up LLVM (Windows)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: bash
        run: |
          choco uninstall llvm -y --all-versions || true
          choco install llvm --version=16.0.0 -y --allow-downgrade --force

      - name: Add LLVM to path
        shell: bash
        run: echo "C:/Program Files/LLVM/bin" >> $GITHUB_PATH

      - name: Resolve LLVM_DIR
        shell: pwsh
        run: |
          $llvmDir = $null

          if (Get-Command llvm-config -ErrorAction SilentlyContinue) {
            $candidate = (llvm-config --cmakedir).Trim()
            if ($candidate -and (Test-Path (Join-Path $candidate 'LLVMConfig.cmake'))) {
              $llvmDir = $candidate
            }
          }

          if (-not $llvmDir) {
            $fallbacks = @(
              'C:\Program Files\LLVM\lib\cmake\llvm',
              'C:\tools\llvm\lib\cmake\llvm'
            )

            foreach ($candidate in $fallbacks) {
              if (Test-Path (Join-Path $candidate 'LLVMConfig.cmake')) {
                $llvmDir = $candidate
                break
              }
            }
          }

          if (-not $llvmDir) {
            Write-Host 'LLVMConfig.cmake was not found in known locations.'
            Get-ChildItem 'C:\Program Files\LLVM' -Recurse -Filter LLVMConfig.cmake -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw 'Unable to resolve LLVM_DIR'
          }

          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -G Ninja -B build `
            -D BUILD_TESTS=ON `
            -D CMAKE_BUILD_TYPE=Release `
            -D CMAKE_C_COMPILER=cl `
            -D CMAKE_CXX_COMPILER=cl `
            -D LLVM_DIR="$env:LLVM_DIR" `
            -D CMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH"

      - name: Build
        shell: bash
        run: cmake --build build --config Release -v

      - name: Run Tests
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=error